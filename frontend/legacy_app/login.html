<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Login | Controle de Validades</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <style>
      :root {
        --bg-primary: #f5f7fb;
        --accent-primary: #2563eb;
        --accent-secondary: #06b6d4;
        --text-primary: #0f172a;
        --text-muted: #475569;
        --border: rgba(15, 23, 42, 0.12);
        --shadow: 0 16px 50px rgba(15, 23, 42, 0.12);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg-primary);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        position: relative;
        overflow-x: hidden;
        overflow-y: auto;
      }
      body::before, body::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        filter: blur(60px);
        opacity: 0.6;
        z-index: 0;
      }
      body::before {
        width: 360px;
        height: 360px;
        background: rgba(37, 99, 235, 0.18);
        top: -80px;
        left: -60px;
      }
      body::after {
        width: 300px;
        height: 300px;
        background: rgba(6, 182, 212, 0.18);
        bottom: -60px;
        right: -40px;
      }
      .card {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 1.1rem;
        width: 100%;
        max-width: 560px;
        position: relative;
        z-index: 1;
      }
      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.25rem;
      }
      .brand-mark {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        color: #fff;
        display: grid;
        place-items: center;
        font-weight: 800;
        box-shadow: 0 12px 36px rgba(37, 99, 235, 0.28);
      }
      .brand-logo {
        width: clamp(180px, 82vw, 400px);
        height: auto;
        border-radius: 12px;
      }
      h1 {
        font-size: 1.15rem;
        color: var(--text-primary);
      }
      p.lead {
        color: var(--text-muted);
        font-size: 0.95rem;
        margin-bottom: 1rem;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }
      label {
        font-weight: 600;
        color: var(--text-primary);
      }
      input {
        width: 100%;
        padding: 0.85rem 1rem;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text-primary);
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
      }
      input:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
      }
      .btn {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
        padding: 0.85rem 1rem;
        border-radius: 12px;
        border: 1px solid transparent;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        color: #fff;
        box-shadow: 0 12px 30px rgba(37, 99, 235, 0.26);
      }
      .status {
        min-height: 20px;
        font-size: 0.9rem;
        color: var(--text-muted);
      }
      .status.ok { color: #16a34a; }
      .status.err { color: #dc2626; }
      .switch {
        margin-top: 0.75rem;
        font-size: 0.95rem;
        color: var(--text-muted);
        text-align: center;
      }
      .switch a {
        color: var(--accent-primary);
        font-weight: 700;
        text-decoration: none;
        padding: 0 0.25rem;
      }
      .switch a:hover { text-decoration: underline; }

      @media (min-width: 640px) {
        body { padding: 1.5rem; }
        .card { padding: 1.75rem; }
        .brand-logo { width: clamp(240px, 64vw, 440px); }
        h1 { font-size: 1.4rem; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <img src="assets/logo.png" alt="Controle de Validades" class="brand-logo" />
      </div>

      <form id="login-form">
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="login-password">Senha</label>
          <input id="login-password" type="password" autocomplete="current-password" required />
        </div>
        <button class="btn" type="submit">Entrar</button>
        <div class="status" id="login-status"></div>
      </form>

      <div class="switch">
        <span>Nao tem conta?</span>
        <a href="signup.html">Assinar plano</a>
      </div>
    </div>

    <script>
      const AUTH_KEY = "gp_auth";
      const USER_KEY = "gp_user";
      const PLAN_KEY = "plan_type";
      const PLAN_FREE = "free";
      const PLAN_BUSINESS = "business";
      const ACCOUNT_BUSINESS_KEY = "gp_account_business";
      const ACCOUNT_ID_KEY = "gp_account_id";
      const ACCOUNT_EXPIRES_KEY = "gp_account_expira_em";
      const ACCOUNT_CREATED_KEY = "gp_account_criado_em";
      const ACCOUNT_WHATSAPP_KEY = "gp_account_whatsapp";
      const ACCOUNT_STORE_KEY = "gp_account_loja";
      const loginForm = document.getElementById("login-form");
      const loginStatus = document.getElementById("login-status");

      const storedAuth = localStorage.getItem(AUTH_KEY) === "1";
      const storedEmail = localStorage.getItem(USER_KEY);
      if (storedAuth && storedEmail) {
        window.location.href = "index.html";
      } else if (storedAuth && !storedEmail) {
        localStorage.removeItem(AUTH_KEY);
      }

      const LOGIN_ENDPOINTS = ["https://myn8n.seommerce.shop/webhook/login"];

      function parseBusinessFlag(value) {
        if (value === true || value === 1) return true;
        if (value === false || value === 0) return false;
        if (typeof value === "string") {
          const normalized = value.trim().toLowerCase();
          if (["1", "true", "yes", "sim", "business"].includes(normalized)) return true;
          if (["0", "false", "no", "nao", "não", "free"].includes(normalized)) return false;
        }
        return null;
      }

      function extractAccountPayload(data) {
        if (!data) return null;
        if (Array.isArray(data)) {
          for (const item of data) {
            const account = extractAccountPayload(item);
            if (account) return account;
          }
          return null;
        }
        if (typeof data !== "object") return null;
        const hasIdentity =
          Object.prototype.hasOwnProperty.call(data, "business") ||
          Object.prototype.hasOwnProperty.call(data, "login") ||
          Object.prototype.hasOwnProperty.call(data, "email") ||
          Object.prototype.hasOwnProperty.call(data, "user") ||
          Object.prototype.hasOwnProperty.call(data, "id");
        if (data.error || data.detail || data.status === "error") {
          return null;
        }
        if (hasIdentity) {
          return data;
        }
        if (typeof data.message === "string" && !data.data && !data.result && !data.account) {
          return null;
        }
        return extractAccountPayload(data.data || data.result || data.account);
      }

      function persistAccountState(account, fallbackEmail = "") {
        const resolvedEmail =
          String(account?.login || account?.email || account?.user || fallbackEmail || "").trim();
        if (resolvedEmail) {
          localStorage.setItem(USER_KEY, resolvedEmail);
        }

        const businessFlag = parseBusinessFlag(account?.business);
        if (businessFlag !== null) {
          localStorage.setItem(ACCOUNT_BUSINESS_KEY, businessFlag ? "1" : "0");
          localStorage.setItem(PLAN_KEY, businessFlag ? PLAN_BUSINESS : PLAN_FREE);
        }

        if (account && Object.prototype.hasOwnProperty.call(account, "id")) {
          localStorage.setItem(ACCOUNT_ID_KEY, String(account.id));
        } else {
          localStorage.removeItem(ACCOUNT_ID_KEY);
        }

        if (account && Object.prototype.hasOwnProperty.call(account, "expira_em")) {
          localStorage.setItem(ACCOUNT_EXPIRES_KEY, String(account.expira_em || ""));
        } else {
          localStorage.removeItem(ACCOUNT_EXPIRES_KEY);
        }

        if (account && Object.prototype.hasOwnProperty.call(account, "criado_em")) {
          localStorage.setItem(ACCOUNT_CREATED_KEY, String(account.criado_em || ""));
        } else {
          localStorage.removeItem(ACCOUNT_CREATED_KEY);
        }

        if (account && Object.prototype.hasOwnProperty.call(account, "whatsapp")) {
          localStorage.setItem(ACCOUNT_WHATSAPP_KEY, String(account.whatsapp || ""));
        } else {
          localStorage.removeItem(ACCOUNT_WHATSAPP_KEY);
        }

        if (account && Object.prototype.hasOwnProperty.call(account, "loja")) {
          localStorage.setItem(ACCOUNT_STORE_KEY, String(account.loja || ""));
        } else {
          localStorage.removeItem(ACCOUNT_STORE_KEY);
        }
      }

      function setStatus(el, text, type = "") {
        if (!el) return;
        el.textContent = text;
        el.className = "status";
        if (type === "ok") el.classList.add("ok");
        if (type === "err") el.classList.add("err");
      }

      async function postJsonWithFallback(urls, body, options = {}) {
        const retryOnHttpError = options.retryOnHttpError !== false;
        let lastError = null;
        for (const url of urls) {
          try {
            const res = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            if (!res.ok) {
              if (!retryOnHttpError) return res;
              throw new Error("Erro HTTP " + res.status);
            }
            return res;
          } catch (err) {
            lastError = err;
          }
        }
        throw lastError || new Error("Falha ao enviar dados.");
      }

      function goToDashboard(email) {
        localStorage.setItem(AUTH_KEY, "1");
        if (email) {
          localStorage.setItem(USER_KEY, email);
        }
        window.location.href = "index.html";
      }

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = (document.getElementById("login-email").value || "").trim();
        const password = (document.getElementById("login-password").value || "").trim();
        if (!email || !password) {
          setStatus(loginStatus, "Preencha email e senha.", "err");
          return;
        }
        const isValidEmail = /\S+@\S+\.\S+/.test(email);
        if (!isValidEmail) {
          setStatus(loginStatus, "Digite um email válido.", "err");
          return;
        }
        setStatus(loginStatus, "Enviando login...");
        try {
          const res = await postJsonWithFallback(LOGIN_ENDPOINTS, {
            user: email,
            email,
            password,
          }, { retryOnHttpError: false });
          const isJson = res?.headers?.get?.("content-type")?.includes("application/json");
          let data = null;
          if (isJson) {
            try {
              data = await res.clone().json();
            } catch (err) {
              console.warn("Resposta de login não é JSON válido:", err);
            }
          }
          const account = extractAccountPayload(data);
          if (!account) {
            setStatus(loginStatus, "Credenciais inválidas ou usuário não encontrado.", "err");
            return;
          }
          persistAccountState(account, email);
          setStatus(loginStatus, "Login enviado.", "ok");
          goToDashboard(localStorage.getItem(USER_KEY) || email);
        } catch (err) {
          setStatus(loginStatus, `Erro ao enviar login: ${err.message || err}`, "err");
        }
      });

    </script>
  </body>
</html>
